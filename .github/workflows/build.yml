name: Build X-Plane Plugin

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Aqui ele cria duas máquinas: uma Windows e uma Mac
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        # O comando do CMake que já configuramos antes
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # <--- AGORA ESTÁ CERTO
        with:
          name: plugin-${{ matrix.os }}
          path: |
            build/Release/*.xpl
            build/*.xpl